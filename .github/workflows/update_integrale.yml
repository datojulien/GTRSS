name: Original Update RSS

# limit GITHUB_TOKEN to only what's strictly needed
permissions:
  contents: write

on:
  schedule:
    - cron: "*/45 * * * *"    # every 45 minutes (UTC)
  workflow_dispatch:          # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RSS filter script
        run: python keep_integrale.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add \
              only_integrale_feed.xml \
              only_best_feed.xml \
              only_remaining_feed.xml \
              grosses-tetes-style.xsl
            git commit -m "chore: update Grosses Têtes feeds"
            git push
          else
            echo "No changes to commit"
          fi
